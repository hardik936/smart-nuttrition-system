services:
  # -----------------------------
  # Backend Service (FastAPI)
  # -----------------------------
  - type: web
    name: smart-nutrition-backend
    env: docker
    dockerfilePath: Dockerfile
    plan: free
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: 8000

  # -----------------------------
  # Frontend Service (React + Nginx)
  # -----------------------------
  - type: web
    name: smart-nutrition-frontend
    env: docker
    dockerContext: frontend
    dockerfilePath: frontend/Dockerfile
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://smart-nutrition-backend.onrender.com


